</head>

        function init() {
            renderMenu();
            renderSection(currentSection);
            updateProgress();
            updateNavButtons();
        }

        function renderMenu() {
            const menu = document.getElementById('nav-menu');
            menu.innerHTML = '';
            
            sections.forEach((section) => {
                const button = document.createElement('button');
                button.className = 'nav-button';
                button.onclick = () => goToSection(section.id);
                
                const icon = completedSections.includes(section.id)
                    ? '<svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                    : '<svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>';
                
                button.innerHTML = icon + '<span>' + section.title + '</span>';
                
                if (section.id === currentSection) {
                    button.classList.add('active');
                }
                
                menu.appendChild(button);
            });
        }

        function renderSection(id) {
            const contentArea = document.getElementById('content-area');
            const section = sections.find(s => s.id === id);
            contentArea.innerHTML = '<div class="section-content active">' + section.content + '</div>';
            window.scrollTo(0, 0);
        }

        function goToSection(id) {
            currentSection = id;
            renderMenu();
            renderSection(id);
            updateNavButtons();
            toggleMenu(false);
        }

        function nextSection() {
            if (currentSection < sections.length - 1) {
                markAsRead();
                currentSection++;
                renderMenu();
                renderSection(currentSection);
                updateNavButtons();
            }
        }

        function previousSection() {
            if (currentSection > 0) {
                currentSection--;
                renderMenu();
                renderSection(currentSection);
                updateNavButtons();
            }
        }

        function markAsRead() {
            if (!completedSections.includes(currentSection)) {
                completedSections.push(currentSection);
                updateProgress();
                renderMenu();
                updateMarkButton();
            }
        }

        function updateProgress() {
            const progress = (completedSections.length / sections.length * 100).toFixed(0);
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-percentage').textContent = progress + '%';
            document.getElementById('sections-completed').textContent = completedSections.length;
            document.getElementById('total-sections').textContent = sections.length;
        }

        function updateNavButtons() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const btnMark = document.getElementById('btn-mark');

            btnPrev.disabled = currentSection === 0;
            btnNext.disabled = currentSection === sections.length - 1;

            updateMarkButton();

            if (currentSection === sections.length - 1) {
                btnMark.style.display = 'none';
            } else {
                btnMark.style.display = 'flex';
            }
        }

        function updateMarkButton() {
            const btnMark = document.getElementById('btn-mark');
            if (completedSections.includes(currentSection)) {
                btnMark.textContent = '✓ Lida';
                btnMark.classList.add('marked');
            } else {
                btnMark.textContent = 'Marcar como Lida';
                btnMark.classList.remove('marked');
            }
        }

        function toggleMenu(force) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            if (force !== undefined) {
                if (force) {
                    sidebar.classList.add('open');
                    overlay.classList.add('show');
                } else {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                }
            } else {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('show');
            }
        }

        // Inicializar ao carregar a página
        window.onload = init;
    </script>
</body>
</html>
